<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals - Julean Chantry - Washington State</title>
    <meta name="description"   content=" Week 3 program from WDD 131- Washington State information and weather details" >
    <meta name="author" content="Julean Chantry">
    <script src="scripts/place.js" defer></script>
    <link rel="stylesheet" href="styles/place.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;1,100;1,500&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


</head>
<body>
    <header>
        <h1>Washington State</h1>
    </header>
    <main>
        <div class="image">
        <picture>
            <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
            <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
            <img src="images/hero-small.webp" alt="peaceful river" width="200" height="150">
        </picture>
        </div>
        <section class="data">
            <h2>Data</h2>
            <table>
                <tbody>
                    <tr>
                        <th>Area:</th>
                        <td>71,362 sq mi</td>
                    </tr>
                    <tr>
                        <th>Population:</th>
                        <td>8.2 million</td>
                    </tr>
                    <tr>
                        <th>Capital:</th>
                        <td>Olympia</td>
                    </tr>
                    <tr>
                        <th>Languages:</th>
                        <td>English</td>
                    </tr>
                    <tr>
                        <th>Currency:</th>
                        <td>USD</td>
                    </tr>
                    <tr>
                        <th>Time Zone:</th>
                        <td>PST (UTC-8)</td>
                    </tr>
                    <tr>
                        <th>Calling Code:</th>
                        <td>+1 509</td>
                    </tr>
                    <tr>
                        <th>Internet TLD:</th>
                        <td>.gov</td>
                    </tr>
                </tbody>
            </table>
        </section>
        <section class="weather">
            <h2 class="weatherHeading">Weather
                <img class="weatherIcon" src="images/sunshine.svg" alt="sunshine icon">
            </h2>
                <table>
                <tbody>
                    <tr>
                        <th>Temperature:</th>
                        <td>50°F</td>
                    </tr>
                    <tr>
                        <th>Conditions:</th>
                        <td>Sunny</td>
                    </tr>
                    <tr>
                        <th>Wind:</th>
                        <td>5 mph</td>
                    </tr>
                    <tr>
                        <th>WindChill:</th>
                        <td><span id="windChill"></span></td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
    <footer>
        <p>©️<span id="currentYear"></span> 🎶 Julean Chantry 🎶 USA </p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
