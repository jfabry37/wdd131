<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 - Dynamic Web Fundamentals - Julean Chantry</title>
    <meta name="author" content="Julean Chantry">
    <meta name="description" content="Form Page - a form for WDD 131 - Dynamic Web Fundamentals - Julean Chantry.">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;1,100&display=swap" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
</head>
<body>
<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        <fieldset class="product">
        <legend>
            <label for="pName">Product Name
                <select name="pName" id="pName" required>
                    <option value="">Select a Product...</option>
                    <option value=""></option>
                </select>
            </label>
        </legend>
        </fieldset>


        <fieldset class="rating">
        <legend>

            <div class="star">Overall Rating</div>
            <label for="oneStar">&star;<input type="radio" name="rating" value="oneStar" required></label>
            <label for="twoStar">&star;&star;<input type="radio" name="rating" value="twoStar" required></label>
            <label for="threeStar">&star;&star;&star;<input type="radio" name="rating" value="threeStar" required></label>
            <label for="fourStar">&star;&star;&star;&star;<input type="radio" name="rating" value="fourStar" required></label>
            <label for="fiveStar">&star;&star;&star;&star;&star;<input type="radio" name="rating" value="fiveStar" required></label>
        
        </legend>
        </fieldset>


        <fieldset class="install">
        <legend>
            <label for="installationDate">Date of Installation
                <input type="date" name="installationDate" id="installationDate" required>
            </label>
        </legend>
        </fieldset>

        <fieldset class="features">
        <legend>
        <div>Useful Features</div>
        <label for="durability"><input type="checkbox" name="durability" id="durability" value="yes">Durability</label>
        <label for="ease"><input type="checkbox" name="ease" id="ease" value="yes">Ease of Use</label>
        <label for="performance"><input type="checkbox" name="performance" id="performance" value="yes">Performance</label>
        <label for="design"><input type="checkbox" name="design" id="design" value="yes">Design</label>
        </legend>
        </fieldset>

        <fieldset class="review">
        <legend>
            <label for="review">Written Review <div class="optional">(optional)</div>
                <textarea name="review" id="review" cols="30" rows="5" placeholder="Write your review here..."></textarea>
            </label>
        </legend>
        </fieldset>


        <fieldset class="name">
        <legend>
            <label for="yourName">Your Name
                <div class="optional">(optional)</div>
                <input type="text" name="yourName" id="yourName">
            </label>
        </legend>
        </fieldset>        


        <fieldset class="submit">
        <legend>
            <input type="submit" value="Post Review">
        </legend>
        </fieldset>     
    </form>
</main>
    <footer> 
        <p>©️<span id="currentYear"></span> 🎶 Julean Chantry 🎶 USA </p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer> 
</body>
</html>
