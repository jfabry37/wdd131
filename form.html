<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 - Dynamic Web Fundamentals - Julean Chantry</title>
    <meta name="author" content="Julean Chantry">
    <meta name="description" content="Form Page - a form for WDD 131 - Dynamic Web Fundamentals - Julean Chantry.">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;1,100&display=swap" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
</head>
<body>
<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">
        <legend class="product">
            <label>Product Name
                <select name="pName" id="pName" required>
                    <option value="">Select a Product...</option>
                    <option value=""></option>
                </select>
            </label>
        </legend>
        <legend class="rating">
            <div class="star">Overall Rating</div>
            <label>&star;<input type="radio" name="rating" id="onestar" required></label>
            <label>&star;&star;<input type="radio" name="rating" id="twostar" required></label>
            <label>&star;&star;&star;<input type="radio" name="rating" id="threestar" required></label>
            <label>&star;&star;&star;&star;<input type="radio" name="rating" id="fourstar" required></label>
            <label>&star;&star;&star;&star;&star;<input type="radio" name="rating" id="fivestar" required></label>
            
        </legend>
        <legend class="install">
            <label>Date of Installation
                <input type="date" name="installationDate" id="InstallationDate" value="InstallationDate" required>
            </label>
        </legend>
        <legend class="features">
        <div>Useful Features</div>
        <label><input type="checkbox" name="durability" id="durability" value="yes">Durability</label>
        <label><input type="checkbox" name="ease" id="ease" value="yes">Ease of Use</label>
        <label><input type="checkbox" name="performance" id="performance" value="yes">Performance</label>
        <label><input type="checkbox" name="design" id="design" value="yes">Design</label>
        </legend>
        <legend class="review">
            <label>Written Review <div class="optional">(optional)</div>
                <textarea name="review" id="review" cols="30" rows="5" placeholder="Write your review here..."></textarea>
            </label>
        </legend>
        <legend class="name">
            <label>Your Name
                <div class="optional">(optional)</div>
                <input type="text" name="yourName" id="yourName">
            </label>
        </legend>
        <legend class="submit">
            <input type="submit" value="Post Review">
        </legend>     
    </form>
</main>
    <footer> 
        <p>©️<span id="currentYear"></span> 🎶 Julean Chantry 🎶 USA </p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer> 
</body>
</html>
